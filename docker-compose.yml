services:
  mysql:
    image: mysql:8
    ports:
      - 3308:3306
    environment:
      MYSQL_USER: msui
      MYSQL_PASSWORD: "blanked"
      MYSQL_ROOT_PASSWORD: "blanked"
  local_env:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: "sleep infinity"
    volumes:
      - .:/app
      - ${HOME}/.config:/home/devuser/.config
      - ${HOME}/.ssh:/home/devuser/.ssh
    ports:
      - "3000:3000"
    depends_on:
      - mysql
